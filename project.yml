name: echo
options:
  bundleIdPrefix: com.nulljosh
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.3.0"
    CURRENT_PROJECT_VERSION: "4"
    DEVELOPMENT_TEAM: QMM486NPYC

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"

targets:
  Echo-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "macOS/**"
    dependencies:
      - package: WhisperKit
        product: WhisperKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.echo
        INFOPLIST_FILE: Sources/iOS/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  Echo-macOS:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "iOS/**"
    dependencies:
      - package: WhisperKit
        product: WhisperKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.echo.mac
        INFOPLIST_FILE: Sources/macOS/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Sources/macOS/echo-mac.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  EchoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: Echo-iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.echo.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Echo-iOS:
    build:
      targets:
        Echo-iOS: all
    run:
      config: Debug
    archive:
      config: Release
    shared: true
  Echo-macOS:
    build:
      targets:
        Echo-macOS: all
    run:
      config: Debug
    archive:
      config: Release
    shared: true
  EchoUITests:
    build:
      targets:
        Echo-iOS: all
        EchoUITests: all
    test:
      targets:
        - EchoUITests
    shared: true
