<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <rect width="900" height="300" style="fill:#ffffff"/>

  <!-- Microphone -->
  <rect x="20" y="110" width="110" height="80" rx="10" style="fill:#f5f5f7;stroke:#d0d0d5;stroke-width:1.5"/>
  <text x="75" y="148" style="font-family:-apple-system,sans-serif;font-size:11px;font-weight:600;fill:#1d1d1f;text-anchor:middle">Microphone</text>
  <text x="75" y="164" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#86868b;text-anchor:middle">AVAudioSession</text>

  <!-- Arrow 1 -->
  <line x1="130" y1="150" x2="168" y2="150" style="stroke:#86868b;stroke-width:1.5;marker-end:url(#arr)"/>

  <!-- AVAudioEngine -->
  <rect x="168" y="110" width="130" height="80" rx="10" style="fill:#f5f5f7;stroke:#d0d0d5;stroke-width:1.5"/>
  <text x="233" y="148" style="font-family:-apple-system,sans-serif;font-size:11px;font-weight:600;fill:#1d1d1f;text-anchor:middle">AVAudioEngine</text>
  <text x="233" y="164" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#86868b;text-anchor:middle">Tap @ native rate</text>

  <!-- Arrow 2 -->
  <line x1="298" y1="150" x2="336" y2="150" style="stroke:#86868b;stroke-width:1.5;marker-end:url(#arr)"/>

  <!-- AVAudioConverter -->
  <rect x="336" y="110" width="130" height="80" rx="10" style="fill:#f5f5f7;stroke:#d0d0d5;stroke-width:1.5"/>
  <text x="401" y="142" style="font-family:-apple-system,sans-serif;font-size:11px;font-weight:600;fill:#1d1d1f;text-anchor:middle">AVAudioConverter</text>
  <text x="401" y="158" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#86868b;text-anchor:middle">16kHz mono</text>
  <text x="401" y="172" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#86868b;text-anchor:middle">Float32</text>

  <!-- Arrow 3 -->
  <line x1="466" y1="150" x2="504" y2="150" style="stroke:#86868b;stroke-width:1.5;marker-end:url(#arr)"/>

  <!-- TranscriptionEngine -->
  <rect x="504" y="100" width="130" height="100" rx="10" style="fill:#e8f0fe;stroke:#0071e3;stroke-width:1.5"/>
  <text x="569" y="142" style="font-family:-apple-system,sans-serif;font-size:11px;font-weight:600;fill:#1d1d1f;text-anchor:middle">Transcription</text>
  <text x="569" y="156" style="font-family:-apple-system,sans-serif;font-size:11px;font-weight:600;fill:#1d1d1f;text-anchor:middle">Engine</text>
  <text x="569" y="174" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#0071e3;text-anchor:middle">@MainActor</text>
  <text x="569" y="188" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#86868b;text-anchor:middle">4s batch cycle</text>

  <!-- Arrow 4 -->
  <line x1="634" y1="150" x2="672" y2="150" style="stroke:#86868b;stroke-width:1.5;marker-end:url(#arr)"/>

  <!-- WhisperKit -->
  <rect x="672" y="100" width="130" height="100" rx="10" style="fill:#f0f5e8;stroke:#34a853;stroke-width:1.5"/>
  <text x="737" y="142" style="font-family:-apple-system,sans-serif;font-size:11px;font-weight:600;fill:#1d1d1f;text-anchor:middle">WhisperKit</text>
  <text x="737" y="158" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#34a853;text-anchor:middle">CoreML</text>
  <text x="737" y="172" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#34a853;text-anchor:middle">Neural Engine</text>
  <text x="737" y="188" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#86868b;text-anchor:middle">On-device only</text>

  <!-- Arrow 5 (back to UI) - goes up and over -->
  <path d="M569 100 L569 60 L802 60 L802 150 L737 150" style="fill:none;stroke:#0071e3;stroke-width:1.5;stroke-dasharray:5,3;marker-end:url(#arrb)"/>

  <!-- UI Label above arrow -->
  <text x="686" y="50" style="font-family:-apple-system,sans-serif;font-size:10px;fill:#0071e3;text-anchor:middle">SwiftUI ContentView</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" style="fill:#86868b"/>
    </marker>
    <marker id="arrb" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" style="fill:#0071e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="270" style="font-family:-apple-system,sans-serif;font-size:12px;fill:#86868b;text-anchor:middle">Echo — On-Device Whisper Transcription Architecture</text>
</svg>
